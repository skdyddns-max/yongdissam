<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>길을 잃으셨나요 | 용디쌤</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/svg+xml" href="/yongdissam/mark.svg">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.css">
<style>
:root{--primary-2:#A8DCC0;--primary-deep:#2E7D54;--bg:#FAF7F0;--ink:#2E5D44;--ink2:#6B7A70}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Pretendard',system-ui,sans-serif;
     min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.7;word-break:keep-all}
h1{font-weight:800;letter-spacing:-1px;font-size:28px;margin:24px 0 8px}
p{color:var(--ink2);margin:0 0 28px}
.btn{display:inline-block;background:var(--primary-deep);color:#fff;border-radius:999px;padding:14px 24px;font-weight:700;text-decoration:none}
.circle{width:120px;height:120px;border-radius:50%;background:var(--primary-2);display:inline-flex;align-items:center;justify-content:center;color:var(--primary-deep)}
</style>
</head>
<body>
<main>
  <div class="circle">
    <svg width="64" height="64" viewBox="0 0 64 64" fill="none" aria-hidden="true">
      <path d="M16 12h32a8 8 0 0 1 8 8v17a8 8 0 0 1-8 8H33l-11 9 1.2-9H16a8 8 0 0 1-8-8V20a8 8 0 0 1 8-8Z" stroke="currentColor" stroke-width="3.2" fill="none" stroke-linejoin="round"/>
      <path d="M32 38V26" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      <path d="M32 30c-3.6 0-6.4-2.8-6.4-6.4 3.6 0 6.4 2.8 6.4 6.4Z" fill="currentColor"/>
      <path d="M32 32c3.6 0 6.4-2.8 6.4-6.4-3.6 0-6.4 2.8-6.4 6.4Z" fill="currentColor"/>
    </svg>
  </div>
  <h1>여기엔 페이지가 없어요</h1>
  <p>괜찮아요, 길을 잃어도 방향은 다시 잡으면 되니까요.</p>
  <a class="btn" href="/yongdissam/">용디쌤 홈으로 🌱</a>
</main>
</body>
</html>
